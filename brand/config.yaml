# =============================================================================
#  БРЕНДБУК КОМПАНИИ
#  Чтобы сделать форк для другой компании — меняйте только этот файл.
# =============================================================================

company:
  name: "Кастос"
  tagline: "Инновации для бизнеса"
  language: "ru"           # ru | en | de | ...
  tone: "formal"           # formal | friendly | technical

# ── Цвета (HEX без #) ─────────────────────────────────────────────────────
colors:
  primary:    "1A3C6E"     # Основной — заголовки, шапки слайдов
  accent:     "E8612A"     # Акцент — выделения, иконки, кнопки
  bg_light:   "F7F8FC"     # Фон светлых слайдов
  bg_dark:    "1A3C6E"     # Фон тёмных слайдов (title, closing)
  text_dark:  "1A1A2E"     # Основной текст
  text_muted: "64748B"     # Второстепенный текст
  success:    "22C55E"     # Позитивный тренд (зелёный)
  danger:     "EF4444"     # Негативный тренд (красный)

  # Палитра графиков (используется по порядку)
  chart_palette:
    - "1A3C6E"
    - "E8612A"
    - "5DCAA5"
    - "EF9F27"
    - "AFA9EC"
    - "F0997B"

# ── Типографика ────────────────────────────────────────────────────────────
typography:
  font_heading: "Calibri"   # Шрифт заголовков
  font_body:    "Calibri"   # Шрифт текста
  # Размеры (pt)
  size_title:   44
  size_heading: 28
  size_section: 22
  size_body:    20
  size_caption: 14

# ── Логотип ────────────────────────────────────────────────────────────────
logo:
  url: ""                   # URL PNG логотипа (оставьте пустым если нет)
  position: "bottom-right"  # bottom-right | bottom-left | top-right | top-left
  width_inches: 1.4         # Ширина логотипа на слайде

# ── Структура слайдов по умолчанию ─────────────────────────────────────────
slide_defaults:
  count: 10                 # Количество слайдов по умолчанию
  always_include:           # Типы слайдов, которые всегда включаются
    - "title"
    - "closing"
  footer_text: ""           # Текст в подвале (пустой = без подвала)
  slide_numbers: true       # Показывать номера слайдов

# ── Поведение агента ────────────────────────────────────────────────────────
agent:
  # Приветственное сообщение бота
  welcome_message: |
    👋 Привет! Я ассистент по презентациям компании Кастос.
    Создаю презентации в фирменном стиле компании.

    Напишите тему или задачу:
    • «Итоги квартала для совета директоров»
    • «Питч-дек для инвесторов с графиками»
    • Прикрепите CSV/XLSX с данными

  # Что агент знает о компании (вставляется в системный промпт)
  company_context: |
    Кастос Кастоди — российская компания, основана в 2025 году специалистами из МФТИ, Accenture, P2P.org, Binance Labs, Blockchain.com и Symbiosis.
    Продукт: платформа корпоративного кастоди для институционального хранения цифровых активов (on-premise).
    Ключевые возможности: MPC Threshold Signing, политики согласования, KYT Gate (AML-скрининг), иммутабельный аудит-журнал.
    Поддерживаемые активы: Bitcoin, Ethereum, Solana, USDC, Avalanche.
    Целевые клиенты: обменники и OTC-дески, майнеры, банки, фонды и эмитенты цифровых активов.
    Рынок: регуляция криптоактивов в России вступает в силу в 2026-2027 годах, создавая спрос на лицензированную инфраструктуру хранения.
    Типичные аудитории презентаций: совет директоров, инвесторы, партнёры, банки, регуляторы.

  # Запрещённые темы / ограничения
  forbidden_topics: []
